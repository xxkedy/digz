name: Generate Digz icon

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - make_icon.py
      - .github/workflows/generate-digz-icon.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pillow
        run: python -m pip install --disable-pip-version-check pillow
      - name: Download Anton font
        run: curl -fsSL https://raw.githubusercontent.com/xxkedy/keyz/main/Anton.ttf -o Anton.ttf
      - name: Generate icon files
        run: python make_icon.py
      - name: Commit generated PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add icon-180.png icon-512.png
          if git diff --cached --quiet; then
            echo "No icon changes"
            exit 0
          fi
          git commit -m "Regenerate Digz icon"
          git push
